<section id="provider-panel" class="provider-panel">
  <div class="provider-status">
    <span class="eyebrow">{% if status.connected %}Connected{% else %}Provider Required{% endif %}</span>
    <h3>{{ status.label }}</h3>
    <p>{{ status.detail }}</p>
    <span class="meta-note">{{ status.updated_label }}</span>
  </div>

  <div class="provider-actions">
    {% if status.connected %}
      {% if !status.using_fallback %}
        <button class="btn btn-ghost" type="button" data-on:click="@post('/settings/provider/logout')">Disconnect</button>
      {% endif %}
    {% else %}
      <button class="btn btn-accent" type="button" data-on:click="window.designstormSettings.connectCodex()">Connect Codex</button>
    {% endif %}
  </div>

  <div id="provider-connect-status" class="provider-connect-status" role="status" aria-live="polite"></div>
  <button id="provider-refresh" type="button" hidden data-on:click="@get('/settings/provider')"></button>
</section>
