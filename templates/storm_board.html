<div id="storm-runs" class="board-nodes">
  {% for run in runs %}
    <article
      id="run-{{ run.id }}"
      class="storm-node"
      data-run-id="{{ run.id }}"
      data-run-prompt="{{ run.prompt }}"
      data-run-title="{{ run.title }}"
      data-run-summary="{{ run.summary }}"
      data-run-assistant-summary="{{ run.assistant_summary }}"
      data-run-preview-url="{{ run.preview_url }}"
      data-run-created-at="{{ run.created_iso() }}"
      data-run-submitted="{{ run.submitted }}"
      data-run-parent-ids="{{ run.parent_ids_csv() }}"
      data-position-x="{% match run.position_x %}{% when Some with (value) %}{{ value }}{% when None %}{% endmatch %}"
      data-position-y="{% match run.position_y %}{% when Some with (value) %}{{ value }}{% when None %}{% endmatch %}"
      data-width="{% match run.width %}{% when Some with (value) %}{{ value }}{% when None %}{% endmatch %}"
      data-height="{% match run.height %}{% when Some with (value) %}{{ value }}{% when None %}{% endmatch %}"
    >
      <div class="storm-node-shell">
        <div class="storm-node-meta">
          <div class="storm-node-meta-left">
            <span class="meta-dot{% if run.submitted %} is-submitted{% endif %}"></span>
            <span class="meta-note">{{ run.created_label() }}</span>
          </div>
          <details class="storm-node-menu" data-node-menu>
            <summary class="storm-node-menu-trigger" aria-label="Node actions">
              <span aria-hidden="true">&hellip;</span>
            </summary>
            <div class="storm-node-menu-panel">
              <a class="storm-node-menu-item" href="/storms/{{ run.id }}/download">Download ZIP</a>
            </div>
          </details>
        </div>
        <div class="storm-node-preview">
          <iframe
            src="{{ run.preview_url }}"
            loading="lazy"
            sandbox="allow-scripts allow-forms allow-modals"
            referrerpolicy="no-referrer"
            tabindex="-1"
            aria-hidden="true"
            data-ignore
          ></iframe>
        </div>
        <div class="storm-node-copy">
          <h3>{{ run.title }}</h3>
        </div>
      </div>
      <div class="node-selection-chrome" aria-hidden="true">
        <div class="node-selection-border"></div>
        <div class="node-resize-handle" data-node-resize-handle data-resize-x="-1" data-resize-y="-1"></div>
        <div class="node-resize-handle" data-node-resize-handle data-resize-x="0" data-resize-y="-1"></div>
        <div class="node-resize-handle" data-node-resize-handle data-resize-x="1" data-resize-y="-1"></div>
        <div class="node-resize-handle" data-node-resize-handle data-resize-x="-1" data-resize-y="0"></div>
        <div class="node-resize-handle" data-node-resize-handle data-resize-x="1" data-resize-y="0"></div>
        <div class="node-resize-handle" data-node-resize-handle data-resize-x="-1" data-resize-y="1"></div>
        <div class="node-resize-handle" data-node-resize-handle data-resize-x="0" data-resize-y="1"></div>
        <div class="node-resize-handle" data-node-resize-handle data-resize-x="1" data-resize-y="1"></div>
      </div>
    </article>
  {% endfor %}

  {% for node in board_nodes %}
    {% include "board_node.html" %}
  {% endfor %}

  <script id="board-edges-data" type="application/json">{{ edges_json|safe }}</script>
</div>
