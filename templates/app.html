{% extends "base.html" %}

{% block content %}
<div
  class="storm-app"
  data-signals:_account-open="false"
  data-signals:_settings-open="false"
  data-signals:prompt="''"
  data-signals:draft-mode="''"
  data-signals:source-ids="''"
  data-signals:_status="'Seed a direction or select a card to branch from it.'"
  data-signals:_generating="false"
  data-signals:_latest-run-id="''"
  data-on:keydown__window="evt.key === 'Escape' && ($_settingsOpen ? ($_settingsOpen = false, $_accountOpen = true) : ($_accountOpen = false, $_settingsOpen = false))"
>

  <div id="palette-panel" class="palette-panel" hidden>
    <div class="palette-bar">
      <div class="palette-bar-icon" aria-hidden="true">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <input id="palette-search" class="palette-search" type="text" placeholder="Search nodes..." autocomplete="off" />
      <div class="palette-filters">
        <button class="palette-chip is-active" data-filter="all">All</button>
        <button class="palette-chip" data-filter="design">Design</button>
        <button class="palette-chip" data-filter="entropy">Entropy</button>
        <button class="palette-chip" data-filter="user_input">Input</button>
        <button class="palette-chip" data-filter="generate">Generate</button>
      </div>
      <kbd class="palette-kbd">ESC</kbd>
    </div>
    <div id="palette-list" class="palette-list"></div>
  </div>
  <div id="palette-backdrop" class="palette-backdrop" hidden></div>

  <div class="account-shell" data-on:click__outside="$_accountOpen = false; $_settingsOpen = false">
    <button
      id="avatar-button"
      class="avatar-btn"
      type="button"
      aria-label="Open account menu"
      data-on:click="$_accountOpen = !$_accountOpen; $_settingsOpen = false"
    >
      <span id="avatar-fallback" class="avatar-fallback" data-name="{{ viewer.name }}"></span>
    </button>

    <section
      id="account-sheet"
      class="sheet"
      role="dialog"
      aria-label="Account"
      style="display: none"
      data-show="$_accountOpen && !$_settingsOpen"
    >
      <div class="sheet-header">
        <span class="eyebrow">Account</span>
        <h2>{{ viewer.name }}</h2>
        <p class="text-muted">{{ viewer.secondary_line() }}</p>
      </div>

      <button id="settings-trigger" class="settings-link" type="button" data-on:click="$_settingsOpen = true; $_accountOpen = false">
        <span class="settings-link-copy">
          <span class="eyebrow">Settings</span>
          <strong>Runtime Provider</strong>
        </span>
        <span class="settings-link-chevron" aria-hidden="true">&rsaquo;</span>
      </button>

      <div class="sheet-actions">
        <button id="account-close" class="btn btn-ghost" type="button" data-on:click="$_accountOpen = false; $_settingsOpen = false">Close</button>
        <button id="account-signout" class="btn btn-accent" type="button" data-on:click="window.designstormAuth.signOut()">Sign out</button>
      </div>
    </section>

    <section
      id="settings-sheet"
      class="sheet"
      role="dialog"
      aria-label="Settings"
      style="display: none"
      data-show="$_settingsOpen"
    >
      <div class="sheet-header-row">
        <button id="settings-back" class="back-btn" type="button" aria-label="Back to account" data-on:click="$_settingsOpen = false; $_accountOpen = true">&lsaquo;</button>
        <div>
          <span class="eyebrow">Settings</span>
          <h2>Runtime Provider</h2>
        </div>
      </div>

      <div class="note-card">
        <strong>Provider</strong>
        <p>Connect Codex here, then generate storms from the canvas.</p>
      </div>

      {{ provider_panel|safe }}

      <div class="sheet-actions">
        <button id="settings-close" class="btn btn-ghost" type="button" data-on:click="$_accountOpen = false; $_settingsOpen = false">Close</button>
      </div>
    </section>
  </div>

  <div id="storm-composer-backdrop" class="composer-backdrop" hidden></div>
  <form id="storm-form" class="composer" hidden>
    <div class="composer-body">
      <div id="storm-draft-context" class="draft-context" hidden></div>

      <input id="storm-draft-mode" data-bind:draft-mode type="hidden" value="">
      <input id="storm-source-ids" data-bind:source-ids type="hidden" value="">
      <input id="storm-status-signal" data-bind:_status type="hidden" value="Seed a direction or select a card to branch from it.">
      <input id="storm-latest-run-id" data-bind:_latest-run-id type="hidden" value="">

      <textarea
        id="storm-prompt"
        data-bind:prompt
        rows="3"
        placeholder="Describe the design direction..."
      ></textarea>
    </div>

    <div class="composer-bar">
      <span id="storm-status" class="status-text" data-text="$_status"></span>
      <button id="storm-clear-context" class="btn btn-ghost" type="button" disabled>Clear</button>
      <button
        id="storm-submit"
        class="btn btn-accent"
        type="button"
        data-on:click="@post('/storms/generate')"
        data-attr:disabled="$_generating"
        data-class:is-loading="$_generating"
      >Generate</button>
    </div>
  </form>

  <form
    id="board-node-create-form"
    hidden
    data-on:submit__prevent="@post('/nodes/create', {contentType: 'form', selector: '#board-node-create-form'})"
  >
    <input id="board-node-create-type" name="node_type" type="hidden" value="">
    <input id="board-node-create-x" name="position_x" type="hidden" value="">
    <input id="board-node-create-y" name="position_y" type="hidden" value="">
    <input id="board-node-create-source-id" name="source_id" type="hidden" value="">
    <input id="board-node-create-source-type" name="source_type" type="hidden" value="">
    <input id="board-node-create-source-anchor-side" name="source_anchor_side" type="hidden" value="">
    <input id="board-node-create-source-anchor_t" name="source_anchor_t" type="hidden" value="">
    <button id="board-node-create-submit" type="submit" hidden></button>
  </form>

  <section id="storm-canvas" class="canvas" aria-label="Design storm canvas">
    <div id="storm-background" class="board-background" aria-hidden="true"></div>
    <div class="canvas-grid" aria-hidden="true"></div>
    <div id="storm-board" class="board">
      <svg id="storm-lines" class="board-lines" aria-hidden="true"></svg>
      {{ board_html|safe }}
    </div>
  </section>


  <section id="storm-focus" class="focus-overlay" hidden aria-hidden="true">
    <div class="focus-backdrop" data-action="close-focus"></div>
    <div class="focus-shell" role="dialog" aria-modal="true" aria-labelledby="storm-focus-title">
      <div class="focus-bar">
        <button id="storm-focus-back" class="btn btn-ghost" type="button">Back</button>
        <h2 id="storm-focus-title">Artifact</h2>
      </div>
      <div class="focus-frame">
        <iframe
          id="storm-focus-preview"
          title="Fullscreen storm preview"
          sandbox="allow-scripts allow-forms allow-modals"
          referrerpolicy="no-referrer"
        ></iframe>
      </div>
    </div>
  </section>

  <nav class="tool-dock" aria-label="Board tools">
    <div class="tool-dock-group">
      <button id="tool-select" class="tool-dock-btn is-active" type="button" title="Select tool (V)">Select</button>
      <button id="tool-pan" class="tool-dock-btn" type="button" title="Hand tool (H)">Pan</button>
    </div>
    <div class="tool-dock-divider" aria-hidden="true"></div>
    <div class="tool-dock-group">
      <button id="tool-add-generate" class="tool-dock-btn" type="button" title="Add generate node at center">Generate</button>
      <button id="tool-add-entropy" class="tool-dock-btn" type="button" title="Add entropy node at center">Entropy</button>
      <button id="tool-add-input" class="tool-dock-btn" type="button" title="Add input node at center">Input</button>
    </div>
  </nav>

  <div id="radial-menu" hidden aria-hidden="true">
    <div id="radial-capture" class="radial-capture"></div>
    <svg id="radial-svg" class="radial-svg"></svg>
    <div id="radial-center" class="radial-center">
      <div class="radial-center-dot"></div>
    </div>
    <div id="radial-items"></div>
  </div>
</div>
{% endblock %}
