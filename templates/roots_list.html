{% if roots.is_empty() %}
  <div class="root-item-empty">No root branches yet. Generate a seed to create the first branch.</div>
{% else %}
  {% for root in roots %}
    <button class="root-item" type="button" data-root-id="{{ root.run_id }}" data-on:click="$rootsOpen = false">
      <div class="root-item-header">
        <h3 class="root-item-title">{{ root.label }}</h3>
        <span class="root-badge">Root {{ loop.index }}</span>
      </div>
      <p class="root-item-summary">{{ root.summary }}</p>
      <div class="root-item-meta">
        <span>{{ root.branch_label() }}</span>
        <span>{{ root.created_label }}</span>
      </div>
    </button>
  {% endfor %}
{% endif %}
