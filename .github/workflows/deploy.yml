name: Deploy to Fly.io

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_KEY }}
  FLY_APP_NAME: designstorm-klr2jw
  FLY_APP_URL: https://designstorm-klr2jw.fly.dev

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate required secrets and vars
        env:
          CLERK_PUBLISHABLE_KEY: ${{ vars.CLERK_PUBLISHABLE_KEY }}
          CLERK_ISSUER: ${{ vars.CLERK_ISSUER }}
          CLERK_JWKS_URL: ${{ vars.CLERK_JWKS_URL }}
          CLERK_JWT_PUBLIC_KEY: ${{ vars.CLERK_JWT_PUBLIC_KEY }}
          APP_URL: ${{ vars.APP_URL }}
          AWS_ENDPOINT_URL_S3: ${{ vars.AWS_ENDPOINT_URL_S3 }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          BUCKET_NAME: ${{ vars.BUCKET_NAME }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          FLY_API_KEY: ${{ secrets.FLY_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in \
            CLERK_PUBLISHABLE_KEY CLERK_ISSUER CLERK_JWKS_URL CLERK_JWT_PUBLIC_KEY APP_URL \
            AWS_ENDPOINT_URL_S3 AWS_REGION BUCKET_NAME \
            CLERK_SECRET_KEY DATABASE_URL SESSION_SECRET FLY_API_KEY \
            AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY TAVILY_API_KEY
          do
            if [ -z "${!name:-}" ]; then
              echo "Missing required configuration: $name" >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure app exists
        run: |
          set -euo pipefail
          flyctl apps create "${FLY_APP_NAME}" || true

      - name: Auth to Fly registry
        run: |
          set -euo pipefail
          flyctl auth docker

      - name: Build and push image
        run: |
          set -euo pipefail
          docker build -t "registry.fly.io/${FLY_APP_NAME}:${GITHUB_SHA}" .
          docker push "registry.fly.io/${FLY_APP_NAME}:${GITHUB_SHA}"

      - name: Set Fly secrets
        run: |
          set -euo pipefail
          flyctl secrets set --stage \
            CLERK_PUBLISHABLE_KEY="${{ vars.CLERK_PUBLISHABLE_KEY }}" \
            CLERK_ISSUER="${{ vars.CLERK_ISSUER }}" \
            CLERK_JWKS_URL="${{ vars.CLERK_JWKS_URL }}" \
            CLERK_JWT_PUBLIC_KEY="${{ vars.CLERK_JWT_PUBLIC_KEY }}" \
            APP_URL="${{ vars.APP_URL }}" \
            AWS_ENDPOINT_URL_S3="${{ vars.AWS_ENDPOINT_URL_S3 }}" \
            AWS_REGION="${{ vars.AWS_REGION }}" \
            BUCKET_NAME="${{ vars.BUCKET_NAME }}" \
            CLERK_SECRET_KEY="${{ secrets.CLERK_SECRET_KEY }}" \
            DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
            TAVILY_API_KEY="${{ secrets.TAVILY_API_KEY }}" \
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --app "${FLY_APP_NAME}"

      - name: Deploy app
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "flyctl deploy (attempt ${attempt})"
            if flyctl deploy --config fly.toml --app "${FLY_APP_NAME}" --image "registry.fly.io/${FLY_APP_NAME}:${GITHUB_SHA}"; then
              exit 0
            fi
            sleep $((attempt * 10))
          done
          echo "flyctl deploy failed after retries" >&2
          exit 1

      - name: Health check
        run: |
          set -euo pipefail
          curl -fsS --retry 10 --retry-delay 3 "${FLY_APP_URL}/healthz"
